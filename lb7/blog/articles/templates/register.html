<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Django Public Blog - Регистрация</title>
    <link rel="stylesheet" href="{{ STATIC_URL }}css/index.css">
</head>
<body>
    <div class="header">
        <img src="{{ STATIC_URL }}img/dpb-logo.png" alt="Логотип">
        <div class="auth-links">
            {% if request.user.is_anonymous %}
                <a href="{% url login %}" class="auth-link">Вход</a>
                <a href="{% url register %}" class="auth-link register-link">Регистрация</a>
            {% else %}
                <span class="user-greeting">Привет, {{ request.user.username }}!</span>
                <a href="{% url logout %}" class="auth-link">Выход</a>
            {% endif %}
        </div>
    </div>

    <div class="content register-form">
        <h1>Регистрация нового пользователя</h1>
        
        <form method="POST" class="auth-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username">Имя пользователя:</label>
                <input type="text" 
                       id="username" 
                       name="username" 
                       placeholder="Введите имя пользователя" 
                       value="{{ form.username }}"
                       class="form-control"
                       required>
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" 
                       id="email" 
                       name="email" 
                       placeholder="Введите ваш email" 
                       value="{{ form.email }}"
                       class="form-control"
                       required>
            </div>
            
            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" 
                       id="password" 
                       name="password" 
                       placeholder="Введите пароль" 
                       class="form-control"
                       required>
            </div>
            
            <div class="form-group">
                <label for="password_confirm">Подтверждение пароля:</label>
                <input type="password" 
                       id="password_confirm" 
                       name="password_confirm" 
                       placeholder="Подтвердите пароль" 
                       class="form-control"
                       required>
            </div>
            
            <div class="form-group">
                <button type="submit" class="submit-btn">Зарегистрироваться</button>
            </div>
            
            {% if form.errors %}
            <div class="errors">
                {{ form.errors }}
            </div>
            {% endif %}
        </form>
        
        <div class="auth-links-bottom">
            <p>Уже есть аккаунт? <a href="{% url login %}">Войдите</a></p>
            <a href="{% url archive %}" class="back-to-archive">← Вернуться к архиву</a>
        </div>
    </div>
</body>
</html>
