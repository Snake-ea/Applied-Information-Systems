<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Архив всех статей</title>
    <link rel="stylesheet" href="{{ STATIC_URL }}css/index.css">
</head>
<body class="archive">
    <div class="header">
        <img src="{{ STATIC_URL }}img/dpb-logo.png" alt="Логотип">
    </div>

    <div class="archive">
        {% for post in posts %}
        <div class="one-post">
            <h2 class="post-title">
                <!-- ИСПРАВЛЕНО: убраны кавычки вокруг имени маршрута для Django 1.4 -->
                <a href="{% url get_article article_id=post.id %}">{{ post.title }}</a>
            </h2>

            <div class="article-info">
                <div class="article-author">{{ post.author.username }}</div>
                <div class="article-created-date">{{ post.created_date|date:"d.m.Y" }}</div>
            </div>

            <p class="article-text">{{ post.get_excerpt }}</p>
        </div>
        {% empty %}
        <p>Нет статей. <a href="/admin/">Добавьте первую</a></p>
        {% endfor %}
    </div>
</body>
</html>
