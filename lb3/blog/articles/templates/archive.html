<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Архив всех статей</title>
    <link rel="stylesheet" href="{{ STATIC_URL }}css/index.css">
</head>
<body>

    <!-- Блок с логотипом проекта -->
    <div class="header">
        <img src="{{ STATIC_URL }}img/dpb-logo.png" alt="Логотип">
    </div>

    <!-- Блок с архивом статей -->
    <div class="archive">
        {% for post in posts %}
        <div class="one-post">
            <!-- Заголовок статьи -->
            <h2 class="post-title">{{ post.title }}</h2>

            <!-- Информация о статье: автор и дата создания -->
            <div class="article-info">
                <div class="article-author">{{ post.author.username }}</div>
                <div class="article-created-date">{{ post.created_date }}</div>
            </div>

            <!-- Текст статьи (выдержка) -->
            <p class="article-text">{{ post.get_excerpt }}</p>
        </div>
        {% endfor %}
    </div>

</body>
</html>
